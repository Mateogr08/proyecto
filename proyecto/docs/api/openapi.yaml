openapi: 3.1.0
info:
  title: API Sistema de Gestión de Solicitudes Académicas
  version: 1.0.0
  description: |
    API RESTful para la gestión estructurada de solicitudes académicas.
    Incluye creación, clasificación, asignación de responsables, cambios de estado,
    cierre y consulta de solicitudes con historial.

  contact:
    name: camila ramirez y mateo garrido
    email: camila.ramirezg1@uqvirtual.edu.co

servers:
  - url: http://localhost:8080/api
    description: Servidor local de desarrollo

paths:
  #--------------------------------------------solicitudes---------------------------------
  /solicitudes:
    post:
      summary: Crear una nueva solicitud
      operationId: crearSolicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudRequest'
      responses:
        '201':
          description: Solicitud creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

  /solicitudes/{id}/clasificar:
    patch:
      summary: Clasificar una solicitud
      operationId: clasificarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificarSolicitudRequest'
      responses:
        '200':
          description: Solicitud clasificada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

  /solicitudes/{id}/asignar-responsable:
    patch:
      summary: Asignar responsable a la solicitud
      operationId: asignarResponsable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarResponsableRequest'
      responses:
        '200':
          description: Responsable asignado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

  /solicitudes/{id}/cambiar-estado:
    patch:
      summary: Cambiar el estado de la solicitud
      operationId: cambiarEstadoSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstadoRequest'
      responses:
        '200':
          description: Estado de la solicitud actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

  /solicitudes/{id}/cerrar:
    patch:
      summary: Cerrar la solicitud
      operationId: cerrarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CerrarSolicitudRequest'
      responses:
        '200':
          description: Solicitud cerrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

  /solicitudes/{id}:
    get:
      summary: Consultar el detalle de una solicitud
      operationId: obtenerDetalleSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle de la solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudDetalleResponse'

#------------------------------------componentes-------------------------------------------
components:
  schemas:

    CrearSolicitudRequest:
      type: object
      required:
        - descripcion
        - tipoSolicitudId
        - prioridadId
        - emailSolicitante
      properties:
        descripcion:
          type: string
          minLength: 20
          maxLength: 1000
          description: Descripción de la solicitud
        tipoSolicitudId:
          type: integer
          description: Tipo de solicitud
        prioridadId:
          type: integer
          description: Prioridad de la solicitud
        emailSolicitante:
          type: string
          format: email
          description: Email del solicitante

    ClasificarSolicitudRequest:
      type: object
      required:
        - tipoSolicitudId
        - prioridadId
      properties:
        tipoSolicitudId:
          type: integer
          description: Tipo de solicitud
        prioridadId:
          type: integer
          description: Prioridad de la solicitud

    AsignarResponsableRequest:
      type: object
      required:
        - emailResponsable
      properties:
        emailResponsable:
          type: string
          format: email
          description: Email del responsable

    CambiarEstadoRequest:
      type: object
      required:
        - nuevoEstado
      properties:
        nuevoEstado:
          type: string
          description: Nuevo estado de la solicitud
        motivo:
          type: string
          maxLength: 500
          description: Motivo del cambio (obligatorio si se reabre)

    CerrarSolicitudRequest:
      type: object
      required:
        - motivoCierre
      properties:
        motivoCierre:
          type: string
          minLength: 10
          maxLength: 500
          description: Motivo del cierre de la solicitud

    EventoHistorialResponse:
      type: object
      properties:
        descripcion:
          type: string
          description: Descripción del evento
        estadoAnterior:
          type: string
          description: Estado anterior de la solicitud
        estadoNuevo:
          type: string
          description: Estado nuevo de la solicitud
        responsable:
          type: string
          description: Usuario responsable del cambio
        observacion:
          type: string
          description: Observación o comentario sobre el evento
        fecha:
          type: string
          format: date-time
          description: Fecha del evento

    SolicitudDetalleResponse:
      type: object
      properties:
        id:
          type: string
          description: Identificador de la solicitud
        tipoSolicitud:
          type: string
          description: Nombre del tipo de solicitud
        prioridad:
          type: string
          description: Prioridad en texto
        estado:
          type: string
          description: Estado actual de la solicitud
        descripcion:
          type: string
          description: Descripción de la solicitud
        emailSolicitante:
          type: string
          format: email
        emailResponsable:
          type: string
          format: email
          nullable: true
        fechaCreacion:
          type: string
          format: date-time
        fechaCierre:
          type: string
          format: date-time
          nullable: true
        historial:
          type: array
          items:
            $ref: '#/components/schemas/EventoHistorialResponse'