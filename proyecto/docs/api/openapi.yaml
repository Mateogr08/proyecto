openapi: 3.1.0

info:
  title: API Sistema de Gestión de Solicitudes Académicas
  version: 1.0.0
  description: |
    API RESTful para la gestión estructurada de solicitudes académicas.
    Basada en Arquitectura Hexagonal y protegida con JWT.

  contact:
    name: camila ramirez y mateo garrido
    email: camila.ramirezg1@uqvirtual.edu.co

servers:
  - url: http://localhost:8080/api
    description: Servidor local de desarrollo

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token JWT generado

  /solicitudes:
    post:
      summary: Crear una nueva solicitud
      description: Permite registrar una nueva solicitud académica. Requiere ROLE_ESTUDIANTE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudRequest'
      responses:
        '201':
          description: Solicitud creada correctamente
    get:
      summary: Listar solicitudes con filtros
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: estado
          in: query
          schema:
            type: string
        - name: tipo
          in: query
          schema:
            type: string
        - name: idSolicitante
          in: query
          schema:
            type: string
        - name: idResponsable
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista de solicitudes

  /solicitudes/{id}:
    get:
      summary: Obtener detalle de una solicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle de la solicitud

  /solicitudes/{id}/clasificar:
    put:
      summary: Clasificar solicitud (Asignar prioridad)
      description: Requiere ROLE_ADMINISTRADOR.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prioridad:
                  type: string
                justificacion:
                  type: string
      responses:
        '200':
          description: Solicitud clasificada

  /solicitudes/{id}/responsable:
    patch:
      summary: Asignar responsable
      description: Requiere ROLE_ADMINISTRADOR.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idResponsable:
                  type: string
      responses:
        '200':
          description: Responsable asignado

  /solicitudes/{id}/atender:
    post:
      summary: Marcar como atendida
      description: Requiere que el actor sea el responsable asignado.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Solicitud atendida

  /solicitudes/{id}/cerrar:
    put:
      summary: Cerrar solicitud
      description: Requiere ROLE_ADMINISTRADOR.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                observacion:
                  type: string
      responses:
        '200':
          description: Solicitud cerrada

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CrearSolicitudRequest:
      type: object
      required:
        - tipo
        - descripcion
        - canal
        - idSolicitante
      properties:
        tipo:
          type: string
          example: PETICION
        descripcion:
          type: string
          example: Problemas con el registro de materias
        canal:
          type: string
          example: WEB
        idSolicitante:
          type: string
          example: "est-01"
